name: Run Tests

# PR을 올리거나 main 브랜치에 push할 때 자동 실행
# GitHub 레포 → Settings → Branches → Branch protection rules 에서 "Require status checks to pass before merging" 을 켜면 테스트 실패 시 머지 버튼이 비활성화됩니다.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 09_testing: 기초 pytest 예제 (순수 함수 + TestClient)
      - name: Run tests
        run: pytest 05_test_depends_example.py --tb=short
